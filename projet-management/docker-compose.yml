services:
  postgres:
    image: postgres:16-alpine
    container_name: stage-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: stage_db
      POSTGRES_USER: stage_user
      POSTGRES_PASSWORD: stage_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stage-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/stage_db
      SPRING_DATASOURCE_USERNAME: stage_user
      SPRING_DATASOURCE_PASSWORD: stage_pass
    depends_on:
      - postgres

volumes:
  postgres_data:
